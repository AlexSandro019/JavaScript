<!DOCTYPE html>
<html>
	<head>
		<title>IMC</title>
		<meta charset = "UTF-8"/>
		<script>
			var notaFinal = prompt("Qual sua nota");
			var cursoHrs = prompt ("Quantas horas de curso você tem?");
			var qtdeFaltas = prompt("Quantas faltas você tem?");
			var limiteFaltas = (cursoHrs * 0.25);
			if(notaFinal >= 50 && qtdeFaltas <= limiteFaltas) {
				alert("Aluno foi certificado");
			}
			else {
				alert("Aluno não foi certificado");
			}
		</script>
	</head>
	<body>
		<h1>Fluxograma</h1>
		
	</body>
</html>
