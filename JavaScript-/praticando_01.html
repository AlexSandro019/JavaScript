<!DOCTYPE html>
<html>
	<head>
		<title>Cálculo da área de um retângulo</title>
		<meta charset = "UTF-8"/>
		<script>
			var base = prompt("Digite o valor da base");
			var altura = prompt("Digite o valor da altura");
			var soma = base * altura;
			alert("O valor da área é a multiplicação da base com a altura, assim: " + base + " vezes " + altura + " = " + soma);
		</script>
			
			
	</head>
	<body>
		<h1>Área</h1>
	</body>
	<html>
