<!DOCTYPE html>
<html>
	<head>
		<title>IMC</title>
		<meta charset = "UTF-8"/>
		<script>
			var peso = prompt("Escreva seu peso:");
			var altura = prompt("Escreva sua altura:");
			var IMC = peso / altura;
			alert("Seu IMC é o seu peso dividido pela sua altura, sendo assim: " + peso + " dividido por " + altura + " = " + IMC);	
		</script>
	</head>
	<body>
		<h1>IMC</h1>
	</body>
</html>
