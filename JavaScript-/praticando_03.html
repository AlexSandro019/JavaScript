<!DOCTYPE html>
<html>
	<head>
		<title>IMC</title>
		<meta charset = "UTF-8"/>
		<script>
			var a25 = prompt("Quantas moedas de 25 você tem? ");
			var a10 = prompt("Quantas moedas de 10 você tem? ");
			var a5 = prompt("Quantas moedas de 5 você tem? ");
			var resultado = a25 * 0.25 + a10 * 0.10 + a5 * 0.05;
			alert("Você tem " + resultado + " reais ");	
		</script>
	</head>
	<body>
		<h1>IMC</h1>
	</body>
</html>
