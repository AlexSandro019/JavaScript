<!DOCTYPE html>
<html>
	<head>
		<meta charset = "UTF-8">
	</head>
	<body>
		<h3>Enviando os dados do formulário</h3>
		<h3>action = "dados_recebidos.html"</h3>
		<h3>method = "get" ou "post"</h3>
		<form action = "dados_recebidos.html" method = "get">
			<p><label for = "nome">Primeiro nome:</label></p>
			<p><input type = "text" id = "nome" name = "nome" placeholder = "Digite o seu nome."</p>
			<p><label for = "sobrenome">Sobrenome:</label></p>
			<p><input type = "text" id = "sobrenome" name = "sobrenome" placeholder = "Digite o seu sobrenome."/></p>
			<p><input type = "submit" value = "ENVIAR"/>
			<input type = "reset" value = "APAGAR OS DADOS DIGITADOS" placeholder = "Digite o seu sobrenome."/>
		</form>
	</body>
</html>
