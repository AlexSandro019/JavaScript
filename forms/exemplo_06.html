<!DOCTYPE html>
<html>
	<head>
		<meta charset = "UTF-8">
		<style>
			body {
				width: 20%;
				background-color: black;
				color: white;
			}
		</style
	</head>
	<body>
		<form>
			<p>
				<fieldset>
					<label for "meu_arquivo">Selecione um arquivo:</label>
					<input type = "file" name = "meu_arquivo"/>
				</fieldset>
			</p>
			<p>
				<fieldset>
					<label for "email_pessoal">Digite o seu email:</label>
					<input type = "email" id = "email_pessoal" name = "email_pessoal"/>
				</fieldset>
			</p>
			<p>
				<fieldset>
					<label for "aniversario_hora">Birthday (data e hora):</label>
					<input type = "datatime-local" id = "aniversario_hora" name = "aniversario_hora"/>
				</fieldset>
			</p>
			<p>
				<fieldset>
					<label for = "cor_favorita">Selecione a sua cor favorita:</label>
					<input type = "color" id = "cor_favorita" name = "cor_favorita"/>
				</fieldset>
			</p>
				<h3>Input com type = data</h3>
					<p>
						<fieldset>
							<label for = "data_aniversario">Qual sua data de nascimento:</label>
							<input type = "date" id = "data_aniversario" name = "data_aniversario"/>
					</p>
					<p>
						<fieldset>
							<label for = "nome_pessoa">Nome:</label>
							<input type = "text" id = "nome_pessoa" name = "nome_pessoa" />
							<input type = "hidden" name = "custo" value = "1000"/>
							<input type = "submit" value = "ENVIAR" />
					</fieldset>
				</p>
				<p>
				<fieldset>
					<label for "quantidade">Quantidade (entre 1 a 5):</label>
					<input type = "number" name = "quantidade" id = "quantidade" min = "1" max = "5"/>
				</fieldset>
			</p>
			<p>
				<fieldset>
					<label for "qtde">Quantidade:</label>
					<input type = "number" name = "qtde" id = "qtde" min = "1" max = "100" step = "10" value = "30"/>
				</fieldset>
			</p>
			<p>
				<fieldset>
					<label for "mensagem">Digite a sua mensagem:</label>
					<textarea id = "mensagem" name = "mensagem" rows = "10"></textarea>
				</fieldset>
			</p>
		</form>
	</body>
</html>
