<!DOCTYPE html>
	<html>
		<head>
			<meta charset = "UTF-8">
			<title>É ou não é?</title>
			<script>
				var n1 = prompt("Escreva um número");
				var sobra = n1 % 2
				if(sobra == 0)
				{
					alert("O número é par");
				}
				else
				{
				alert("O número é impar")
				}
			</script>
		</head>
	<body>
		<h1>Par ou ímpar</h1>
	</body>
</html>
